name: Neura Daily Digest

on:
  workflow_dispatch:   # cron-job.org から正確な時刻にトリガーする

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # git push のために必要
      actions: write         # Pages デプロイ失敗時の再実行トリガーに必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect articles (FR-01)
        run: python scripts/collect.py
        # 失敗時: 後続ステップはすべてスキップされる（exit(1)による）

      - name: Summarize with Gemini (FR-02)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/summarize.py

      - name: Notify Discord (FR-03)
        continue-on-error: true   # Discord失敗でもarchive.pyを必ず実行する
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/notify.py

      - name: Archive to GitHub Pages (FR-04)
        run: python scripts/archive.py
        # GITHUB_TOKEN はcheckout時に自動設定されるため env: 不要

      - name: Retry Pages deployment if it fails
        # archive.py の push が GitHub 側の "pages build and deployment" を起動するが、
        # そのデプロイがGitHub側の一時的なエラーで失敗することがあるため監視・自動リトライする
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Watching Pages deployment for commit $SHA"
          for i in $(seq 1 12); do
            sleep 15
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=$SHA" --jq '.workflow_runs[] | select(.name=="pages build and deployment") | .id' 2>/dev/null | head -1 || true)
            if [ -z "$RUN_ID" ]; then
              echo "[$i] Pages run not created yet, waiting..."
              continue
            fi
            STATUS=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" --jq '.status' 2>/dev/null || echo "")
            CONCLUSION=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" --jq '.conclusion // empty' 2>/dev/null || echo "")
            echo "[$i] run_id=$RUN_ID status=$STATUS conclusion=$CONCLUSION"
            if [ "$STATUS" != "completed" ]; then
              continue
            fi
            if [ "$CONCLUSION" = "success" ]; then
              echo "Pages deployment succeeded"
              exit 0
            fi
            echo "Pages deployment failed (conclusion=$CONCLUSION) → requesting rerun"
            gh api -X POST "repos/${{ github.repository }}/actions/runs/$RUN_ID/rerun-failed-jobs" 2>/dev/null || true
            sleep 20
          done
          echo "::warning::Pages deployment did not confirm success within the polling window"
